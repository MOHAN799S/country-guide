<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Data</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/744/744480.png" type="png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
:root{
  --bg: #06131f;

  --primary: #38bdf8;
  --secondary: #0ea5e9;
  --accent: #67e8f9;

  --card:
    rgba(255,255,255,0.06);

  --card-strong:
    rgba(255,255,255,0.10);

  --border:
    rgba(255,255,255,0.08);

  --glow:
    rgba(56,189,248,0.22);

  --text: #ffffff;

  --text-soft:
    rgba(255,255,255,0.72);

  --shadow:
    0 10px 40px rgba(0,0,0,0.45);

  --transition:
    all 0.35s cubic-bezier(0.4,0,0.2,1);
}



*{
  font-family: 'Poppins', sans-serif;

  margin: 0;
  padding: 0;

  box-sizing: border-box;
}


body{
  min-height: 100vh;

  background:
    radial-gradient(
      circle at top,
      rgba(56,189,248,0.12),
      transparent 30%
    ),
    radial-gradient(
      circle at bottom right,
      rgba(14,165,233,0.08),
      transparent 25%
    ),
    var(--bg);

  display: flex;
  justify-content: center;
  align-items: center;

  overflow-x: hidden;

  color: var(--text);

  padding: 20px;
}

#container{
  width: min(580px, 95%);

  box-sizing: border-box;

  background: var(--card);

  border:
    1px solid var(--border);

  padding: 42px;

  margin: 40px auto;

  color: var(--text);

  border-radius: 26px;

  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);

  box-shadow:
    var(--shadow),
    inset 0 1px 0 rgba(255,255,255,0.05);

  transition: var(--transition);
}

#container:hover{
  transform:
    translateY(-4px);

  border-color:
    rgba(56,189,248,0.28);

  box-shadow:
    var(--shadow),
    0 0 60px rgba(56,189,248,0.12);
}


#country_img{
  display: flex;
  justify-content: center;
  align-items: center;

  width: 65%;

  margin: 0 auto 20px;

  border-radius: 16px;

  border:
    1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.35);
}


#input_text{
  width: calc(100% - 90px);

  height: 52px;

  border:
    1px solid rgba(255,255,255,0.08);

  padding: 0 18px;

  border-radius: 18px;

  background:
    rgba(255,255,255,0.03);

  color: var(--text);

  font-size: 1rem;

  outline: none;

  transition: var(--transition);

  backdrop-filter: blur(12px);
}

#input_text:focus{
  border-color:
    rgba(56,189,248,0.35);

  box-shadow:
    0 0 24px rgba(56,189,248,0.12);
}

::placeholder{
  color:
    rgba(255,255,255,0.45);

  text-transform: capitalize;

  font-size: 0.95rem;

  font-weight: 500;
}



#search_btn{
  border: none;

  cursor: pointer;

  width: 56px;
  height: 52px;

  border-radius: 18px;

  margin-left: 10px;

  background:
    linear-gradient(
      135deg,
      var(--primary),
      var(--accent)
    );

  color: #08131f;

  font-size: 1.25rem;

  transition: var(--transition);

  box-shadow:
    0 10px 24px rgba(56,189,248,0.22);
}

#search_btn:hover{
  transform:
    translateY(-4px)
    scale(1.03);

  box-shadow:
    0 16px 34px rgba(56,189,248,0.32);
}



#wrapper{
  font-size: 20px;

  display: none;

  flex-direction: column;

  margin-top: 30px;

  gap: 14px;
}


#non-wrapper{
  margin-top: 20px;

  font-weight: 600;

  overflow: hidden;

  text-align: center;

  color: var(--accent);

  font-size: 1.1rem;

  border-right:
    2px solid rgba(103,232,249,0.5);

  white-space: nowrap;

  animation:
    typing 5s steps(70,end) infinite;
}

@keyframes typing{
  from{
    width: 0;
  }

  to{
    width: 100%;
  }
}

#load{
  display: flex;

  flex-direction: column;

  gap: 10px;

  margin-top: 24px;
}

.loader{
  width: 100%;
  height: 6px;

  border-radius: 999px;

  background:
    linear-gradient(
      90deg,
      rgba(56,189,248,0.25),
      rgba(255,255,255,0.08)
    );

  animation:
    loader 1.5s ease-in-out infinite;
}

@keyframes loader{

  0%{
    opacity: 1;
  }

  50%{
    opacity: 0.25;
  }

  100%{
    opacity: 1;
  }
}


.details{
  color: var(--text);

  font-size: 1.05rem;

  font-weight: 600;

  padding: 18px;

  border-radius: 18px;

  background:
    rgba(255,255,255,0.03);

  border:
    1px solid rgba(255,255,255,0.06);

  transition: var(--transition);

  word-break: break-word;
}

.details:hover{
  transform:
    translateX(4px);

  border-color:
    rgba(56,189,248,0.25);

  background:
    rgba(56,189,248,0.06);
}



@media screen and (max-width: 768px){

  #container{
    width: 95%;

    padding: 24px;

    border-radius: 22px;
  }

  #input_text{
    width: calc(100% - 74px);

    height: 48px;
  }

  #search_btn{
    width: 48px;
    height: 48px;
  }

  .details{
    font-size: 0.95rem;

    padding: 14px;
  }

  #country_img{
    width: 80%;
  }
}

@media screen and (max-width: 480px){

  body{
    padding: 14px;
  }

  #container{
    padding: 20px;

    border-radius: 18px;
  }

  #input_text{
    font-size: 0.9rem;
  }

  .details{
    font-size: 0.88rem;
  }

  #non-wrapper{
    font-size: 0.95rem;
  }
}
    </style>
</head>
<body>
    <div id="container">
        <input type="text" id="input_text" placeholder="Enter Country">
        <button id="search_btn"><i class="bx bx-search"></i></button><br>
        <div id="wrapper">
        <img id="country_img" class="details">
        <p id="country_name" class="details">Country : </p><br>
        <p id="country_capital" class="details">Capital : </p><br>
        <p id="population" class="details">Total Population : </p><br>
        <p id="continent" class="details">Continent : </p><br>
        <p id="currency" class="details">Currency : </p><br>
        <p id="timezone" class="details">TimeZone : </p><br>
        </div>
        <div id="non-wrapper"></div>
        <div id="load">
            <div class="loader"></div>
            <div class="loader"></div>
            <div class="loader"></div>
        </div>
    </div>
    <script >
        let name1 = document.getElementById("input_text");
        let result = document.getElementById("wrapper");
        let btn = document.getElementById("search_btn");
        let country_name = document.getElementById("country_name");
        let country_capital = document.getElementById("country_capital");
        var country_img = document.getElementById("country_img");
        let country_population = document.getElementById("population");
        let country_continent = document.getElementById("continent");
        let country_currencies = document.getElementById("currency");
        let country_timezones = document.getElementById("timezone");
        let nonwrapper = document.getElementById("non-wrapper");
        let load = document.getElementById("load");

        load.style.display = "none"  

    btn.addEventListener("click", async () => {
    load.style.display = "flex"
    result.style.display = "none"
    let  name = name1.value;
    let url = `https://restcountries.com/v3.1/name/${name}?fullText=true`
    await fetch(url)
    .then(response => response.json())
    .then(data => { 
        nonwrapper.style.display ="none"
        country_img.src = `${data[0].flags.png}`;
        country_name.innerHTML = `Country : ${data[0].name.common}`;
        country_capital.innerHTML = `Capital : ${data[0].capital[0]} `;
        country_population.innerHTML =`Population : ${data[0].population}`;
        country_continent.innerHTML = `Continent : ${data[0].continents[0]}`;
        country_currencies.innerHTML = `Currency : ${data[0].currencies[Object.keys(data[0].currencies)].name}`;
        country_timezones.innerHTML = `TimeZone : ${data[0].timezones}`;
        setTimeout(() => {
            load.style.display = "none";
            result.style.display = "flex"
        },2000);
        
    })
    .catch((err) => {
        console.log(err.message);
        if(name1.value.length == 0) {
            nonwrapper.innerText  = `Sorry ,Input must not be empty`;

        }
        else{
            nonwrapper.innerHTML  = `Opps, Please Enter Valid Input`;
        }
        setTimeout(() => {
            load.style.display = "none"
        result.style.display = "none"
        nonwrapper.style.display ="flex"
        }, 2000); 
    })
    });
    </script>
</body>
</html>
